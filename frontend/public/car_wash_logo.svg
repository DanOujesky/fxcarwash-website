<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Outer circle -->
  <circle cx="250" cy="250" r="240" fill="none" stroke="#1E3A8A" stroke-width="12"/>

  <!-- Car silhouette -->
  <g fill="#1E3A8A">
    <rect x="150" y="240" width="200" height="80" rx="20"/>
    <rect x="180" y="210" width="140" height="50" rx="15"/>
    <circle cx="185" cy="330" r="28" fill="#1E40AF"/>
    <circle cx="315" cy="330" r="28" fill="#1E40AF"/>
  </g>

  <!-- Water drops above car -->
  <g fill="#3B82F6">
    <path d="M250 120 C260 100, 280 100, 290 120 C290 140, 250 160, 250 160 C250 160, 210 140, 210 120 C220 100, 240 100, 250 120 Z"/>
    <circle cx="200" cy="160" r="15"/>
    <circle cx="300" cy="160" r="15"/>
    <circle cx="230" cy="100" r="10"/>
    <circle cx="270" cy="100" r="10"/>
  </g>

  <!-- Text -->
  <text x="250" y="430" font-size="52" text-anchor="middle" fill="#1E3A8A" font-family="Arial Black, sans-serif">
    CAR WASH
  </text>
</svg>